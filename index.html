<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chatroom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #475569;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error-color);
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: var(--success-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - User List */
        .sidebar {
            width: 250px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-count {
            background: var(--primary-color);
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: var(--bg-tertiary);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-name {
            font-size: 0.875rem;
            flex: 1;
        }

        .user-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            background: var(--bg-secondary);
            border-bottom-left-radius: 0.25rem;
            align-self: flex-start;
        }

        .message.sent {
            background: var(--primary-color);
            border-bottom-right-radius: 0.25rem;
            align-self: flex-end;
        }

        .message.system {
            background: transparent;
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.875rem;
            align-self: center;
            padding: 0.5rem 1rem;
        }

        .message.join {
            color: var(--success-color);
        }

        .message.leave {
            color: var(--warning-color);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .message-nickname {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .message-content {
            word-wrap: break-word;
            line-height: 1.4;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 1rem;
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .message-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.75rem 1.25rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--primary-color);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Login Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 1rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .modal p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .modal input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        .modal input:focus {
            border-color: var(--primary-color);
        }

        .modal button {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal button:hover {
            background: var(--primary-hover);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>👋 Welcome to Chatroom!</h2>
            <p>Enter your nickname to start chatting</p>
            <input type="text" id="nicknameInput" placeholder="Your nickname..." maxlength="20" autofocus>
            <button onclick="joinChat()">Join Chat</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <h1>💬 Real-Time Chatroom</h1>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar - User List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>👥 Online Users</span>
                <span class="user-count" id="userCount">0</span>
            </div>
            <div class="user-list" id="userList">
                <!-- Users will be populated here -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <div class="messages-container" id="messagesContainer">
                <!-- Messages will appear here -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <input type="text" class="message-input" id="messageInput" 
                           placeholder="Type a message..." disabled>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                        Send ➤
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Global variables
        let ws = null;
        let nickname = '';
        let users = [];

        // DOM elements
        const loginModal = document.getElementById('loginModal');
        const nicknameInput = document.getElementById('nicknameInput');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const userList = document.getElementById('userList');
        const userCount = document.getElementById('userCount');

        nicknameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                sendMessage();
            }
        });

        // Join chat with nickname
        function joinChat() {
            nickname = nicknameInput.value.trim();
            if (!nickname) {
                nickname = 'Anonymous_' + Math.random().toString(36).substring(2, 6);
            }

            loginModal.classList.add('hidden');
            connectWebSocket();
        }

        // Connect to WebSocket server
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?nickname=${encodeURIComponent(nickname)}`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateConnectionStatus(true);
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    // Handle multiple messages (batched)
                    const lines = event.data.split('\n');
                    lines.forEach(line => {
                        if (line.trim()) {
                            try {
                                const msg = JSON.parse(line);
                                handleMessage(msg);
                            } catch (err) {
                                console.error('Parse error:', err);
                            }
                        }
                    });
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateConnectionStatus(false);
                messageInput.disabled = true;
                sendBtn.disabled = true;
                
       
                setTimeout(() => {
                    if (!ws || ws.readyState === WebSocket.CLOSED) {
                        connectWebSocket();
                    }
                }, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };
        }


        function handleMessage(data) {
            switch (data.type) {
                case 'chat':
                    addChatMessage(data);
                    break;
                case 'join':
                    addSystemMessage(`${data.nickname} ${data.content}`, 'join');
                    break;
                case 'leave':
                    addSystemMessage(`${data.nickname} ${data.content}`, 'leave');
                    break;
                case 'user_list':
                    updateUserList(data.users);
                    break;
                default:
                    console.log('Unknown message type:', data.type);
            }
        }

 
        function addChatMessage(data) {
            const messageDiv = document.createElement('div');
            const isSent = data.nickname === nickname;
            
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            const time = new Date(data.timestamp).toLocaleTimeString([], { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-nickname">${escapeHtml(data.nickname)}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">${escapeHtml(data.content)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

   
        function addSystemMessage(content, type = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message system ${type}`;
            messageDiv.textContent = content;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }


        function updateUserList(userListData) {
            users = userListData || [];
            userCount.textContent = users.length;
            
            userList.innerHTML = users.map(user => {
                const initial = user.charAt(0).toUpperCase();
                const isCurrentUser = user === nickname;
                return `
                    <div class="user-item">
                        <div class="user-avatar">${initial}</div>
                        <span class="user-name">${escapeHtml(user)}${isCurrentUser ? ' (you)' : ''}</span>
                        <div class="user-status"></div>
                    </div>
                `;
            }).join('');
        }

       
        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            ws.send(content);
            messageInput.value = '';
            messageInput.focus();
        }

  
        function updateConnectionStatus(connected) {
            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected';
            }
        }

     
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

    
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
